# === Filterung ===
filtering:
  keep_only_no_website: true
  treat_social_media_as_no_website: true
  social_media_domains:
    - "facebook.com"
    - "instagram.com"
    - "twitter.com"
    - "x.com"
    - "tiktok.com"
    - "linkedin.com"

# === Output ===
output:
  directory: "data/output"
  format: "csv"    # "csv", "excel", oder "both"
  filename_prefix: "zuerich_ohne_website"

# === Rate Limiting ===
rate_limiting:
  requests_per_second: 1.0
  max_retries: 3
  retry_backoff_base: 2
  retry_max_wait_seconds: 60

# === Fortschritt ===
progress:
  enabled: true
  directory: "data/progress"
  checkpoint_every_n_queries: 10
