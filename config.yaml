# === API Keys ===
# Setze den Key via Umgebungsvariable SERPAPI_KEY oder hier
api_keys:
  serpapi: ""

# === Suchgebiet: Zürich ===
search_area:
  name: "Zürich"
  center_lat: 47.3769
  center_lon: 8.5417
  lat_min: 47.28
  lat_max: 47.48
  lon_min: 8.40
  lon_max: 8.70
  lat_step: 0.03      # ~3.3 km
  lon_step: 0.045      # ~3.3 km bei dieser Breitengrad
  zoom: "14z"

# === Suchparameter ===
search:
  language: "de"
  max_pages_per_query: 1    # 1 Seite = 20 Ergebnisse pro Suche (spart API-Calls)
  results_per_page: 20

