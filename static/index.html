<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>local.ch Scraper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">local.ch Scraper</h1>
            <p class="text-gray-500 mt-1">Finde lokale Businesses und kategorisiere Leads (Quelle: local.ch)</p>
        </div>

        <!-- Search Form -->
        <div id="searchForm" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Ort</label>
                <input type="text" id="location" placeholder="z.B. Uster, Winterthur, Zürich..."
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <!-- Categories -->
            <div class="mb-4">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-medium text-gray-700">Kategorien</label>
                    <div class="space-x-2">
                        <button onclick="selectAll(true)" class="text-xs text-blue-600 hover:underline">Alle</button>
                        <button onclick="selectAll(false)" class="text-xs text-blue-600 hover:underline">Keine</button>
                    </div>
                </div>
                <div id="categories" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                </div>
            </div>

            <button onclick="startScrape()" id="startBtn"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors">
                Suche starten
            </button>
        </div>

        <!-- Progress -->
        <div id="progressSection" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 fade-in">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-semibold text-gray-900">Fortschritt</h2>
                <span id="statusBadge" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                    Läuft...
                </span>
            </div>
            <div class="mb-3">
                <div class="flex justify-between text-sm text-gray-600 mb-1">
                    <span id="progressLocation"></span>
                    <span id="progressPct">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="progressBar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="grid grid-cols-5 gap-4 text-center">
                <div>
                    <div id="statFound" class="text-2xl font-bold text-gray-900">0</div>
                    <div class="text-xs text-gray-500">Gefunden</div>
                </div>
                <div>
                    <div id="statNoWeb" class="text-2xl font-bold text-green-600">0</div>
                    <div class="text-xs text-gray-500">Ohne Website</div>
                </div>
                <div>
                    <div id="statHasWeb" class="text-2xl font-bold text-orange-500">0</div>
                    <div class="text-xs text-gray-500">Mit Website</div>
                </div>
                <div>
                    <div id="statEmails" class="text-2xl font-bold text-blue-600">0</div>
                    <div class="text-xs text-gray-500">Emails gefunden</div>
                </div>
                <div>
                    <div id="statTerm" class="text-sm font-medium text-gray-700 truncate">-</div>
                    <div class="text-xs text-gray-500">Aktueller Begriff</div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="resultsSection" class="hidden fade-in">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-gray-900">
                        Ergebnisse: <span id="resultCount">0</span> Leads
                    </h2>
                    <button onclick="downloadCSV()" id="downloadBtn"
                        class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition-colors">
                        CSV Download
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Lead-Typ</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Name</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Adresse</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Telefon</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Email</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Website</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Kategorie</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-600">Rating</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody" class="divide-y divide-gray-100">
                        </tbody>
                    </table>
                </div>
                <div id="pagination" class="p-4 border-t border-gray-200 flex items-center justify-between">
                    <span id="pageInfo" class="text-sm text-gray-500"></span>
                    <div class="space-x-2">
                        <button onclick="prevPage()" id="prevBtn" class="px-3 py-1.5 border rounded text-sm disabled:opacity-50" disabled>Zurück</button>
                        <button onclick="nextPage()" id="nextBtn" class="px-3 py-1.5 border rounded text-sm disabled:opacity-50" disabled>Weiter</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;
        let pollInterval = null;
        let allResults = [];
        let currentPage = 0;
        const PAGE_SIZE = 25;

        // Kategorien laden
        async function loadCategories() {
            const resp = await fetch('/api/categories');
            const groups = await resp.json();
            const container = document.getElementById('categories');

            for (const [group, terms] of Object.entries(groups)) {
                const div = document.createElement('div');
                div.className = 'border border-gray-200 rounded-lg p-3';
                div.innerHTML = `
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" checked data-group="${group}"
                            class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <span class="text-sm font-medium text-gray-800">${group}</span>
                        <span class="text-xs text-gray-400">(${terms.length})</span>
                    </label>
                `;
                container.appendChild(div);
            }

            window._categoryGroups = groups;
        }

        function selectAll(checked) {
            document.querySelectorAll('#categories input[type="checkbox"]').forEach(cb => cb.checked = checked);
        }

        function getSelectedCategories() {
            const selected = [];
            document.querySelectorAll('#categories input[type="checkbox"]:checked').forEach(cb => {
                const group = cb.dataset.group;
                if (window._categoryGroups[group]) {
                    selected.push(...window._categoryGroups[group]);
                }
            });
            return selected;
        }

        // Suche starten
        async function startScrape() {
            const location = document.getElementById('location').value.trim();
            if (!location) {
                alert('Bitte einen Ort eingeben');
                return;
            }

            const categories = getSelectedCategories();
            if (categories.length === 0) {
                alert('Bitte mindestens eine Kategorie wählen');
                return;
            }

            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'Starte...';

            try {
                const resp = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ location, categories }),
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    alert(err.detail || 'Fehler beim Starten');
                    btn.disabled = false;
                    btn.textContent = 'Suche starten';
                    return;
                }

                const data = await resp.json();
                currentJobId = data.job_id;

                // UI aktualisieren
                document.getElementById('progressSection').classList.remove('hidden');
                document.getElementById('resultsSection').classList.add('hidden');
                document.getElementById('progressLocation').textContent = data.location;
                document.getElementById('progressBar').style.width = '0%';
                document.getElementById('progressBar').className = 'bg-blue-600 h-3 rounded-full transition-all duration-500';
                document.getElementById('statusBadge').textContent = 'Läuft...';
                document.getElementById('statusBadge').className = 'px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800';

                btn.textContent = 'Läuft...';

                // Polling starten
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(pollStatus, 2000);

            } catch (e) {
                alert('Netzwerkfehler: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Suche starten';
            }
        }

        async function pollStatus() {
            if (!currentJobId) return;

            try {
                const resp = await fetch(`/api/status/${currentJobId}`);
                const data = await resp.json();

                document.getElementById('progressPct').textContent = data.progress_pct + '%';
                document.getElementById('progressBar').style.width = data.progress_pct + '%';
                document.getElementById('statFound').textContent = data.total_found;
                document.getElementById('statNoWeb').textContent = data.no_website_count;
                document.getElementById('statHasWeb').textContent = data.has_website_count;
                document.getElementById('statEmails').textContent = data.email_found_count || 0;
                document.getElementById('statTerm').textContent = data.current_term || '-';

                // Status-Badge aktualisieren
                if (data.status === 'verifying') {
                    const vText = data.verify_total > 0
                        ? `Verifizierung ${data.verified_count}/${data.verify_total}`
                        : 'Verifizierung...';
                    document.getElementById('statusBadge').textContent = vText;
                    document.getElementById('statusBadge').className = 'px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800';
                    document.getElementById('progressBar').className = 'bg-purple-600 h-3 rounded-full transition-all duration-500';
                }

                if (data.status === 'completed') {
                    clearInterval(pollInterval);
                    document.getElementById('statusBadge').textContent = 'Fertig';
                    document.getElementById('statusBadge').className = 'px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800';
                    document.getElementById('progressBar').className = 'bg-green-600 h-3 rounded-full transition-all duration-500';
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = 'Neue Suche';
                    loadResults();
                } else if (data.status === 'error') {
                    clearInterval(pollInterval);
                    document.getElementById('statusBadge').textContent = 'Fehler';
                    document.getElementById('statusBadge').className = 'px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800';
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = 'Erneut versuchen';
                    alert('Fehler: ' + data.error_message);
                }
            } catch (e) {
                console.error('Polling error:', e);
            }
        }

        async function loadResults() {
            const resp = await fetch(`/api/results/${currentJobId}`);
            const data = await resp.json();
            allResults = data.businesses;
            currentPage = 0;

            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('resultCount').textContent = data.count;
            renderPage();
        }

        function renderPage() {
            const start = currentPage * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, allResults.length);
            const page = allResults.slice(start, end);

            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';

            for (const b of page) {
                const rating = b.rating ? `${b.rating} ★` : '-';
                const emailCell = b.email
                    ? `<a href="mailto:${esc(b.email)}" class="text-blue-600 hover:underline">${esc(b.email)}</a>`
                    : '-';
                const isHot = b.lead_type === 'Keine Website';
                const badgeClass = isHot
                    ? 'bg-green-100 text-green-800'
                    : 'bg-orange-100 text-orange-800';
                const badgeText = isHot ? 'Keine Website' : 'Website vorhanden';
                const websiteCell = b.website
                    ? `<a href="${esc(b.website)}" target="_blank" class="text-blue-600 hover:underline text-xs truncate block max-w-[160px]">${esc(b.website.replace(/^https?:\/\//, ''))}</a>`
                    : '-';
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${badgeClass}">${badgeText}</span></td>
                    <td class="px-4 py-3 font-medium text-gray-900">${esc(b.name)}</td>
                    <td class="px-4 py-3 text-gray-600">${esc(b.address || '-')}</td>
                    <td class="px-4 py-3 text-gray-600">${esc(b.phone || '-')}</td>
                    <td class="px-4 py-3 text-gray-600">${emailCell}</td>
                    <td class="px-4 py-3 text-gray-600">${websiteCell}</td>
                    <td class="px-4 py-3"><span class="px-2 py-0.5 bg-gray-100 rounded text-xs">${esc(b.category || '-')}</span></td>
                    <td class="px-4 py-3 text-gray-600">${rating}</td>
                `;
                tbody.appendChild(tr);
            }

            // Pagination
            const totalPages = Math.ceil(allResults.length / PAGE_SIZE);
            document.getElementById('pageInfo').textContent = allResults.length > 0
                ? `${start + 1}–${end} von ${allResults.length}`
                : 'Keine Ergebnisse';
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
        }

        function prevPage() { if (currentPage > 0) { currentPage--; renderPage(); } }
        function nextPage() { currentPage++; renderPage(); }

        function downloadCSV() {
            if (currentJobId) {
                window.location.href = `/api/download/${currentJobId}`;
            }
        }

        function esc(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Init
        loadCategories();
    </script>
</body>
</html>
